    - generic [ref=f3e85]:
      - generic [ref=f3e86]:
        - heading "About Jaecks" [level=2] [ref=f3e87]
        - paragraph [ref=f3e88]: Bridget has 27 years of experience across treatment centers, outpatient settings, and public and charter schools. She is committed to supporting adolescents and adults as they recover from addictions, eating disorders, trauma, grief, depression, and anxiety.
        - paragraph [ref=f3e89]: She is a Level II trained EMDR specialist (Eye Movement Desensitization and Reprocessing), a psychotherapy technique that helps people heal from trauma and distressing experiences by changing how difficult memories are stored in the brain — reducing emotional turmoil and the vividness of the trauma.
        - paragraph [ref=f3e90]: As a Licensed Chemical Dependency Counselor (LCDC), Bridget also treats individuals and families struggling with addiction. Her extensive education, training, and experience give her a deep understanding of how addiction affects a person physically, emotionally, and relationally.
