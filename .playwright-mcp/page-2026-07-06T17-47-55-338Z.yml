    - generic [ref=f2e83]:
      - generic [ref=f2e84]:
        - heading "About Sanford" [level=2] [ref=f2e85]
        - paragraph [ref=f2e86]: Dr. Diann Sanford is the owner of Change-Well, PLLC and a licensed Texas psychologist in private practice. She has served as a therapist and psychologist in group practice treating a diverse population — including soldiers and their families — and is skilled at applying a wide range of psychotherapeutic approaches, with a special interest in integrative, strengths-based, and holistic care.
        - paragraph [ref=f2e87]: Her clients have presented with concerns ranging from major depression, mood and adjustment disorders, and addictions to personality disorders, spanning ages seven through senior adulthood. She has conducted clinical evaluations for children, adolescents, and adults, and has worked in both inpatient and outpatient behavioral health settings performing intakes, crisis management, and individual and group counseling.
        - paragraph [ref=f2e88]: Dr. Sanford presented Heart Rate Variability (HRV) research at the Texas Psychological Association in 2019, and completed her doctoral project on the use of HRV as an intervention in the treatment of depression, anxiety, and ADHD. A former adjunct university professor and public-school educator, she brings a rich background in teaching, talent development, and performance coaching to her work.
